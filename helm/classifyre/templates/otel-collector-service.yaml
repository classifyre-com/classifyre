{{- if and .Values.telemetry.enabled .Values.telemetry.receiver.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "classifyre.otelCollector.fullname" . }}
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
  {{- with .Values.telemetry.receiver.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.telemetry.receiver.service.type }}
  selector:
    {{- include "classifyre.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
    - name: metrics
      port: 8888
      targetPort: metrics
      protocol: TCP
{{- end }}
