{{- if not .Values.api.maskedConfigEncryption.existingSecret }}
{{- $secretName := include "classifyre.apiMaskedConfigSecretName" . -}}
{{- $secretKey := include "classifyre.apiMaskedConfigSecretKey" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingValue := "" -}}
{{- if and $existingSecret (hasKey $existingSecret.data $secretKey) -}}
{{- $existingValue = (index $existingSecret.data $secretKey | b64dec) -}}
{{- end -}}
{{- $configuredValue := .Values.api.maskedConfigEncryption.value | default "" -}}
{{- $generatedValue := randAlphaNum 32 -}}
{{- $resolvedValue := $existingValue | default $configuredValue -}}
{{- if and (eq $resolvedValue "") .Values.api.maskedConfigEncryption.autoGenerate -}}
{{- $resolvedValue = $generatedValue -}}
{{- end -}}
{{- if eq $resolvedValue "" -}}
{{- fail "api.maskedConfigEncryption requires either existingSecret, value, or autoGenerate=true" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $secretKey }}: {{ $resolvedValue | quote }}
{{- end }}
