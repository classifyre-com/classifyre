{{- if and (eq .Values.postgres.mode "external") (not .Values.postgres.external.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "classifyre.databaseSecretName" . }}
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "classifyre.databasePasswordKey" . }}: {{ required "postgres.external.password is required when postgres.external.existingSecret is not set" .Values.postgres.external.password | quote }}
{{- end }}
{{- if and (eq .Values.postgres.mode "embedded") (not .Values.postgres.embedded.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "classifyre.databaseSecretName" . }}
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "classifyre.databasePasswordKey" . }}: {{ required "postgres.embedded.password is required when postgres.embedded.existingSecret is not set" .Values.postgres.embedded.password | quote }}
{{- end }}
{{- if and (eq .Values.postgres.mode "cnpg") (not .Values.postgres.cnpg.bootstrapSecretName) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "classifyre.databaseSecretName" . }}
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgres.cnpg.user | quote }}
  password: {{ required "Set postgres.cnpg.appPassword or provide postgres.cnpg.bootstrapSecretName" .Values.postgres.cnpg.appPassword | quote }}
{{- end }}
