{{- if and .Values.rbac.create .Values.api.cliJobs.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "classifyre.api.fullname" . }}-job-manager
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "classifyre.api.fullname" . }}-job-manager
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "classifyre.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "classifyre.api.fullname" . }}-job-manager
{{- end }}
