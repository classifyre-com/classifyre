{{- if and .Values.telemetry.enabled .Values.telemetry.receiver.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "classifyre.otelCollector.fullname" . }}
  labels:
    {{- include "classifyre.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.telemetry.receiver.replicaCount }}
  selector:
    matchLabels:
      {{- include "classifyre.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        {{- include "classifyre.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: otel-collector
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/otel-collector-configmap.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: {{ .Values.telemetry.receiver.image.repository }}:{{ .Values.telemetry.receiver.image.tag }}
          imagePullPolicy: {{ .Values.telemetry.receiver.image.pullPolicy }}
          args:
            - "--config=/etc/otelcol/collector.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
          {{- with .Values.telemetry.receiver.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          {{- with .Values.telemetry.receiver.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "classifyre.otelCollector.fullname" . }}-config
{{- end }}
