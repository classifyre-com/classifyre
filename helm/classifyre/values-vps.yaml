# VPS demo/test values
# Single-node K3s, no ingress, NodePort access for web only.
# API remains ClusterIP — Next.js proxies /api calls server-side.
# Access: http://144.217.166.247:30100

api:
  replicaCount: 1

  image:
    repository: classifyre/api
    tag: "main"
    pullPolicy: Always

  # API image defaults to /app/api, which is required for Prisma config discovery.
  startCommand: node dist/src/main.js

  autoscaling:
    enabled: false

  pdb:
    enabled: false

  cliJobs:
    image:
      repository: classifyre/cli
      tag: "main"
      pullPolicy: Always
    # Stamatatos06 / CLASSIFIER+ENTITY combos exhaust default 4Gi limit; bump to 6Gi.
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 6Gi
    # local-path provisioner only supports ReadWriteOnce
    uvCache:
      accessModes:
        - ReadWriteOnce
    playwrightCache:
      accessModes:
        - ReadWriteOnce

  runnerLogs:
    accessModes:
      - ReadWriteOnce

  migration:
    # Published API image currently keeps Prisma engine files under root-owned Bun modules.
    # Run only the migration init container as root; keep the main API container non-root.
    containerSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false

frontend:
  replicaCount: 1

  image:
    repository: classifyre/web
    tag: "main"
    pullPolicy: Always

  startCommand: node /app/apps/web/server.js

  autoscaling:
    enabled: false

  pdb:
    enabled: false

  service:
    type: NodePort
    port: 3100
    nodePort: 30100

ingress:
  enabled: false

postgres:
  mode: embedded
  embedded:
    password: "classifyre-vps-demo"
    persistence:
      accessModes:
        - ReadWriteOnce
